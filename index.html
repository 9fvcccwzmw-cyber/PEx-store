<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEX store - الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mouse-glow"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">🛍️ PEx Store</a>
            <div class="search-container">
                <input type="text" id="searchInput" oninput="searchProducts()" placeholder="ابحث عن منتج... 🔍">
            </div>
            <div class="nav-cart" id="navCartIcon" onclick="openCartPage()">
                <span id="cartBadge" class="badge">0</span>
                <span class="cart-icon">🛒 السلة</span>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <h1>مرحباً بك في PEx Store 🚀</h1>
    </header>

    <main class="container">
        <h2 class="section-title">🔥 المنتجات المميزة</h2>
        <p id="noProductsMessage" style="display: none; text-align: center; font-size: 1.2rem; color: #64748b; margin: 40px 0;">لم نجد أي منتج بهذا الاسم 🔍</p>

        <div class="products" id="products"></div>

        <hr class="separator">

        <section id="cartSection" class="cart-page" style="display: none;">
            <div class="cart-container">
                <div class="cart-header">
                    <button class="back-to-shop" onclick="closeCartPage()">🪶 العودة للتسوق</button>
                    <h1>سلة المشتريات الخاصة بك 🛍️</h1>
                </div>
                <div class="cart-content-wrapper">
                    <div class="cart-items-wrapper">
                        <ul id="cartItems"></ul>
                        <button class="clear-cart-btn" onclick="clearCart()">🗑️ إفراغ السلة بالكامل</button>
                    </div>
                    <div class="cart-summary-card">
                        <h3>ملخص الطلب</h3>
                        <hr style="border: 0; height: 1px; background: #e2e8f0; margin: 15px 0;">
                        <div class="summary-row">
                            <span>عدد المواد:</span>
                            <span id="summaryTotalItems">0 قطع</span>
                        </div>
                        <div class="summary-row total-row">
                            <span>المجموع الكلي:</span>
                            <span id="total">0 دينار</span>
                        </div>
                        <button class="checkout-btn" onclick="openModal()">تأكيد الطلب وشحن المنتجات 🚀</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>📝 أدخل معلومات الشحن</h2>
            <form id="orderForm" onsubmit="sendOrder(event)">
                <label style="font-weight: 600; color: #1e293b;">الاسم الكامل:</label>
                <input type="text" id="customerName" required placeholder="مثال: محمد علي">
                <label style="font-weight: 600; color: #1e293b;">رقم الهاتف:</label>
                <input type="tel" id="customerPhone" required placeholder="مثال: 07701234567">
                <label style="font-weight: 600; color: #1e293b;">العنوان بالتفصيل:</label>
                <input type="text" id="customerAddress" required placeholder="المحافظة - المنطقة - أقرب نقطة دالة">
                <button type="submit">✅ تأكيد وإرسال عبر الواتساب</button>
            </form>
        </div>
    </div>

    <div id="productDetailsModal" class="modal">
        <div class="modal-content" style="max-width: 650px;">
            <span class="close-btn" onclick="closeProductDetails()">&times;</span>
            <div class="product-details-container" style="display: flex; flex-direction: column; gap: 20px; margin-top: 20px;">
                <div class="gallery-section" style="text-align: center;">
                    <div style="height: 250px; display: flex; justify-content: center; align-items: center; background: #f8fafc; border-radius: 15px; overflow: hidden;">
                        <img id="mainDetailImage" src="" alt="" style="max-height: 100%; max-width: 100%; object-fit: contain;">
                    </div>
                    <div id="thumbnailsContainer" style="display: flex; justify-content: center; gap: 10px; margin-top: 10px; flex-wrap: wrap;"></div>
                </div>
                <div class="info-section">
                    <h2 id="detailProductName" style="color: #1e293b; margin-bottom: 10px;"></h2>
                    <p id="detailProductDesc" style="color: #64748b; line-height: 1.6; font-size: 1rem; margin-bottom: 15px;"></p>
                    <h3 id="detailProductPrice" style="color: #10b981; font-size: 1.4rem; margin-bottom: 20px;"></h3>
                    <button id="detailAddToCartBtn" style="width: 100%; background: #4f46e5; color: white; border: none; padding: 14px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer;">🛒 إضافة هذا المنتج للسلة</button>
                </div>
            </div>
        </div>
    </div>

    <div id="imageZoomModal" class="zoom-modal" onclick="closeImageZoom()">
        <span class="zoom-close-btn">&times;</span>
        <img id="zoomedImage" src="" alt="صورة مكبرة">
    </div>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>
    <audio id="cartSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>
    <audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-84.wav" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
